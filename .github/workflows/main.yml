name: Build IPA (No Signing)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest
    
    - name: Build Archive (No Signing)
      run: |
        xcodebuild archive \
          -project myplay.xcodeproj \
          -scheme myplay \
          -configuration Release \
          -archivePath ./build/myplay.xcarchive \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
          
    - name: Create IPA
      run: |
        mkdir -p ./build/Payload
        cp -r ./build/myplay.xcarchive/Products/Applications/myplay.app ./build/Payload/
        cd ./build
        zip -r myplay.ipa Payload
        cd ..
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: myplay.ipa
        path: ./build/myplay.ipa
